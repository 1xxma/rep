<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>r1zh_qq - Расписание</title>
    <style>
        /* ===== ВСЕ СТИЛИ (ТЕ ЖЕ, ЧТО БЫЛИ) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; color: #fff; font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { font-size: 24px; font-weight: 900; color: #a29bfe; }
        .stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .stat {
            padding: 6px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat span { color: #fd79a8; font-weight: 700; }
        .gold { color: #ffd700; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #888;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab-btn:hover { background: rgba(108,92,231,0.2); color: #fff; }
        .tab-btn.active {
            background: linear-gradient(135deg, #6c5ce7, #fd79a8);
            color: #fff;
            border-color: transparent;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #a29bfe;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #aaa; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        
        input[type="text"], input[type="time"], input[type="tel"], input[type="date"] {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #6c5ce7; background: rgba(108,92,231,0.1); }
        input[type="color"] {
            width: 100%;
            height: 44px;
            padding: 4px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
        }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        select:focus { outline: none; border-color: #6c5ce7; background: rgba(108,92,231,0.1); }
        select option { background: #1a1a2e; color: #fff; }
        textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
            font-family: Arial, sans-serif;
            resize: vertical;
            min-height: 60px;
        }
        textarea:focus { outline: none; border-color: #6c5ce7; background: rgba(108,92,231,0.1); }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 6px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
        }
        
        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #6c5ce7, #fd79a8);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(108,92,231,0.4); }
        .btn-full { width: 100%; }
        .btn-small { width: auto; padding: 6px 16px; font-size: 13px; }
        .btn-danger {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.2);
            width: auto;
            padding: 4px 12px;
            font-size: 12px;
        }
        .btn-danger:hover { background: #ff6b6b; color: #fff; box-shadow: none; }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            width: auto;
            padding: 4px 12px;
            font-size: 12px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; box-shadow: none; }
        .btn-success {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.2);
            width: auto;
            padding: 4px 12px;
            font-size: 12px;
        }
        .btn-success:hover { background: #2ed573; color: #fff; box-shadow: none; }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #1a1a2e;
        }
        .btn-gold:hover { box-shadow: 0 8px 30px rgba(255,215,0,0.4); }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .btn-group .btn { width: auto; }
        
        .student-list { max-height: 400px; overflow-y: auto; }
        .student-list::-webkit-scrollbar { width: 5px; }
        .student-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .student-list::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            margin-bottom: 6px;
            transition: all 0.3s;
        }
        .student-item:hover { background: rgba(108,92,231,0.1); }
        .student-item .name { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; flex-wrap: wrap; }
        .student-item .color-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .student-item .badge {
            font-size: 11px; padding: 2px 10px; border-radius: 12px;
            background: rgba(255,215,0,0.15); color: #ffd700;
        }
        .student-item .badge-gray {
            font-size: 11px; padding: 2px 10px; border-radius: 12px;
            background: rgba(255,255,255,0.05); color: #666;
        }
        .student-item .contacts-info {
            font-size: 12px;
            color: #666;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .student-controls { display: flex; gap: 4px; flex-wrap: wrap; }
        
        .table-wrap { overflow-x: auto; }
        .schedule-table {
            width: 100%; border-collapse: collapse; font-size: 13px; min-width: 650px;
        }
        .schedule-table th {
            padding: 10px 12px;
            background: rgba(108,92,231,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            color: #a29bfe;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .schedule-table td {
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            vertical-align: middle;
        }
        .schedule-table .time-cell {
            font-weight: 600; color: #fff;
            background: rgba(108,92,231,0.1);
            cursor: pointer; min-width: 60px;
        }
        .schedule-table .time-cell:hover { background: rgba(255,107,107,0.2); }
        .student-tag {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 13px; color: #fff; cursor: pointer; transition: all 0.3s;
            font-weight: 500;
        }
        .student-tag:hover { transform: scale(1.05); }
        .empty-slot { color: #444; font-size: 12px; }
        .add-btn {
            background: none;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #555;
            padding: 2px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .add-btn:hover { border-color: #6c5ce7; color: #6c5ce7; }
        
        .time-controls {
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px;
        }
        .time-controls .btn { width: auto; }
        .time-controls input { width: 120px; }
        .hint { color: #666; font-size: 12px; }
        
        .earnings-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 16px;
        }
        .earning-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .earning-card .label { font-size: 12px; color: #888; text-transform: uppercase; }
        .earning-card .amount {
            font-size: 28px; font-weight: 700; color: #ffd700; margin-top: 4px;
        }
        .earning-card .amount span { font-size: 16px; }
        
        .earnings-days {
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 12px;
        }
        .earnings-days .title {
            font-size: 16px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 12px;
        }
        .earnings-days .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .earnings-days .row:last-child { border-bottom: none; }
        .earnings-days .day-name { color: #aaa; font-size: 14px; }
        .earnings-days .day-earn { color: #ffd700; font-weight: 700; font-size: 14px; }
        .earnings-days .total-row {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid rgba(255,215,0,0.3);
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 700;
        }
        .earnings-days .total-row .total-label { color: #fff; }
        .earnings-days .total-row .total-amount { color: #ffd700; }
        
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            padding: 14px 24px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            z-index: 1000;
            animation: slideUp 0.4s ease;
            max-width: 90%;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .empty-message {
            text-align: center; padding: 40px 20px; color: #555; font-size: 15px;
        }
        .info-box {
            margin-top: 16px; padding: 16px;
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 12px;
        }
        .info-box .row {
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .info-box .row span { color: #888; font-size: 13px; }
        .info-box .row span strong { color: #fff; }
        .info-box .row span .gold-text { color: #ffd700; }
        
        /* Стили для печати */
        @media print {
            body { background: #fff; color: #000; padding: 0; }
            .header { border: 1px solid #ddd; background: #f5f5f5; }
            .logo { color: #6c5ce7; -webkit-text-fill-color: #6c5ce7; }
            .stat { border: 1px solid #ddd; background: #f5f5f5; }
            .stat span { color: #6c5ce7; }
            .tabs { display: none; }
            .tab-content { display: block !important; }
            .tab-btn { display: none; }
            .card { border: 1px solid #ddd; background: #f5f5f5; }
            .card-title { color: #6c5ce7; -webkit-text-fill-color: #6c5ce7; }
            .schedule-table th { background: #6c5ce7; color: #fff; }
            .schedule-table td { border: 1px solid #ddd; }
            .btn { display: none; }
            .time-controls { display: none; }
            .add-btn { display: none; }
            .empty-slot { color: #aaa; }
            .student-tag { color: #fff !important; }
            .student-item { border: 1px solid #ddd; }
            .stat .gold { color: #f0a500; }
            .toast { display: none; }
            .earnings-grid { page-break-inside: avoid; }
            .earnings-days { page-break-inside: avoid; }
            .info-box { page-break-inside: avoid; }
        }
        
        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #a29bfe;
            margin-bottom: 16px;
        }
        .modal .modal-close {
            float: right;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .modal .modal-close:hover { color: #fff; }
        
        .report-preview {
            margin-top: 16px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .report-preview.show { display: block; }
        
        .report-empty {
            padding: 40px;
            text-align: center;
            color: #555;
        }
        .report-empty .icon { font-size: 48px; margin-bottom: 12px; }

        /* ============================================ */
        /* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
        /* ============================================ */

        @media (max-width: 400px) {
            body { padding: 6px; }
            .header { padding: 10px 12px; }
            .logo { font-size: 17px; }
            .stat { font-size: 10px; padding: 3px 8px; }
            .stat span { font-size: 12px; }
            
            .tab-btn { padding: 6px 10px; font-size: 10px; min-width: 44px; }
            .card { padding: 10px; }
            .card-title { font-size: 14px; }
